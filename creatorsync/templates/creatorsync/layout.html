{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <title>CreatorSync</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link
        href="{% static 'creatorsync/styles.css' %}"
        rel="stylesheet"
    >

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="{% url 'index' %}">
                CreatorSync
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'campaigns' %}">
                            Campaigns
                        </a>
                    </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'creators' %}">
                                Creators
                            </a>
                        </li>

                    {% if user.is_authenticated %}

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'profile' %}">
                                {{ user.username }}
                            </a>
                        </li>
                    
                    <li class="nav-item">
                            <a class="nav-link" href="{% url 'applications' %}">
                                Applications
                            </a>
                        </li>

                       <li class="nav-item">

                           <a class="nav-link"
                              href="{% url 'dashboard' %}"
                            >
                              Dashboard
                           </a>

                      </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'logout' %}">
                                Logout
                            </a>
                        </li>

                    {% else %}

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">
                                Login
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'register' %}">
                                Register
                            </a>
                        </li>

                    {% endif %}

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Content -->
    <div class="container mt-4">

        {% block body %}
        {% endblock %}

    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'creatorsync/script.js' %}"></script>

</body>
</html>
