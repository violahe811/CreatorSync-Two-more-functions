{% extends "creatorsync/layout.html" %}

{% block body %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-sm">

            <div class="card-body p-5">

                <h1 class="mb-3">
                    {{ campaign.title }}
                </h1>

                <p class="text-muted mb-4">
                    Posted by {{ campaign.brand.username }}
                </p>

                <hr>

                <h5 class="mt-4">
                    Description
                </h5>

                <p>
                    {{ campaign.description }}
                </p>

                <h5 class="mt-4">
                    Budget
                </h5>

                <p>
                    ${{ campaign.budget }}
                </p>

                <h5 class="mt-4">
                    Deadline
                </h5>

                <p>
                    {{ campaign.deadline }}
                </p>

                <h5 class="mt-4">
                    Status
                </h5>

                <p>
                    {{ campaign.status }}
                </p>

                <a
                   href="{% url 'apply_campaign' campaign.id %}"
                   class="btn btn-dark"
                >
                   Apply to Campaign
                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
