{% extends "creatorsync/layout.html" %}

{% block body %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <h2 class="mb-4">
            Login
        </h2>

        {% if message %}

            <div class="alert alert-danger">
                {{ message }}
            </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Username"
                >
            </div>

            <div class="mb-3">
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                >
            </div>

            <button class="btn btn-dark">
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}
